<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shrivatsa Atman Trivedi — Résumé World</title>
  <meta name="description" content="An interactive 3D résumé experience — walk around Shrivatsa's résumé." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }
    canvas { display: block; }

    #css-renderer {
      position: absolute; top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* ---------- dialogue bubble ---------- */
    .dialogue-bubble {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      padding: 14px 18px;
      max-width: 320px;
      min-width: 180px;
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 1.6;
      color: #1a1a2e;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      position: relative;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    }
    .dialogue-bubble.visible { opacity: 1; transform: scale(1); }
    .dialogue-bubble.hiding { opacity: 0; transform: scale(0.9); transition: opacity 0.3s ease-in, transform 0.3s ease-in; }
    .dialogue-bubble .bubble-tail {
      position: absolute; bottom: -12px; left: 50%;
      margin-left: -10px;
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 14px solid rgba(255,255,255,0.96);
    }
    .dialogue-bubble a {
      color: #4338ca; font-weight: bold; text-decoration: underline;
    }
    .dialogue-bubble.underwater {
      border: 2px solid rgba(80, 200, 255, 0.65);
      box-shadow: 0 0 24px rgba(0, 170, 255, 0.45);
      animation: bubbleRipple 2.2s ease-in-out infinite;
    }
    @keyframes bubbleRipple {
      0%, 100% { box-shadow: 0 0 18px rgba(0,170,255,0.35); }
      50% { box-shadow: 0 0 34px rgba(0,220,255,0.6); }
    }

    /* ---------- HUD ---------- */
    #hud-modes {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 100;
    }
    .hud-btn {
      background: rgba(10, 10, 20, 0.75);
      color: #e8e8ff;
      border: 1px solid rgba(100, 120, 255, 0.4);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'SF Pro', 'Segoe UI', sans-serif;
      font-size: 13px;
      letter-spacing: 0.03em;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s;
    }
    .hud-btn:hover {
      background: rgba(60, 80, 200, 0.5);
      border-color: rgba(100, 140, 255, 0.8);
      transform: translateY(-2px);
    }
    .hud-btn.active {
      background: rgba(60, 80, 200, 0.7);
      box-shadow: 0 0 12px rgba(80, 120, 255, 0.4);
    }
    #btn-camera { position: fixed; top: 20px; right: 20px; z-index: 100; }

    #controls-legend {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      background: rgba(10,10,20,0.7);
      border: 1px solid rgba(100,120,255,0.3);
      border-radius: 12px;
      padding: 10px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-family: 'SF Pro', 'Segoe UI', sans-serif;
      font-size: 12px;
      color: rgba(220,220,255,0.8);
      line-height: 2.0;
      max-width: 260px;
    }
    #controls-legend summary { cursor: pointer; font-weight: 600; color: #cfd4ff; outline: none; }
    #breath-bar {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 14px; z-index: 100;
      background: rgba(0,0,0,0.5);
      border-radius: 7px; border: 1px solid rgba(80,180,255,0.5);
      overflow: hidden;
      display: none;
    }
    #breath-bar label {
      position: absolute; left: -34px; top: -2px;
      font-size: 11px; color: #aee2ff; font-family: 'Segoe UI', sans-serif;
    }
    #breath-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #00aaff, #00ffcc);
      transition: width 0.1s linear;
    }
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 90;
      box-shadow: inset 0 0 140px 60px rgba(255, 0, 40, 0.55);
      opacity: 0; transition: opacity 0.2s;
    }

    /* ---------- mobile joystick ---------- */
    #joystick {
      position: fixed; bottom: 90px; left: 34px; z-index: 110;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(40, 50, 120, 0.18);
      border: 1.5px solid rgba(110, 130, 255, 0.4);
      display: none; touch-action: none;
    }
    #joystick .nub {
      position: absolute; left: 50%; top: 50%;
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(110, 130, 255, 0.45);
      border: 1px solid rgba(160, 180, 255, 0.7);
      transform: translate(-50%, -50%);
    }
    #btn-jump {
      position: fixed; bottom: 110px; right: 34px; z-index: 110;
      width: 74px; height: 74px; border-radius: 50%;
      font-size: 24px; display: none;
    }
    body.touch #joystick, body.touch #btn-jump { display: block; }

    /* ---------- loading screen ---------- */
    #loader {
      position: fixed; inset: 0; z-index: 1000;
      background: #030308;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity 0.8s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    #loader-ring {
      width: 74px; height: 74px; border-radius: 50%;
      border: 2px solid rgba(100, 120, 255, 0.15);
      border-top-color: #6366f1;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader-name {
      font-size: 18px; letter-spacing: 0.45em; text-transform: uppercase;
      color: #e8e8ff; font-weight: 200; text-align: center; padding: 0 20px;
    }
    #loader-sub { font-size: 12px; color: #555a77; letter-spacing: 0.2em; }

    .click-hint { color: #8a90b8; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="loader">
    <div id="loader-ring"></div>
    <div id="loader-name">Shrivatsa Atman Trivedi's Résumé</div>
    <div id="loader-sub">LOADING WORLD...</div>
  </div>

  <script>
    // Failsafe, independent of the module bundle: never trap a visitor on
    // the loader. If the world hasn't revealed itself in 8s, fade out
    // anyway; if a startup error fires first, say so instead of spinning.
    (function () {
      var failsafe = setTimeout(function () {
        var l = document.getElementById('loader');
        if (l && !l.classList.contains('done')) l.classList.add('done');
      }, 8000);
      window.addEventListener('error', function () {
        var l = document.getElementById('loader');
        if (l && !l.classList.contains('done')) {
          clearTimeout(failsafe);
          var sub = document.getElementById('loader-sub');
          if (sub) sub.textContent = 'SOMETHING WENT WRONG — TRY A REFRESH';
        }
      });
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
